name: Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag version to release"
        required: true
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jobs:
          - { goos: darwin, goarch: arm64, output: arm64 }
          - { goos: darwin, goarch: amd64, goamd64: v1, output: amd64-v1 }
          - { goos: darwin, goarch: amd64, goamd64: v3, output: amd64-v3 }

          - { goos: linux, goarch: "386", output: "386" }
          - { goos: linux, goarch: amd64, goamd64: v1, output: amd64-v1 }
          - { goos: linux, goarch: amd64, goamd64: v3, output: amd64-v3 }
          - { goos: linux, goarch: arm64, output: arm64 }
          - { goos: linux, goarch: loong64, output: loong64-abi1, abi: "1" }
          - { goos: linux, goarch: loong64, output: loong64-abi2, abi: "2" }
          - { goos: linux, goarch: riscv64, output: riscv64 }

          - { goos: windows, goarch: "386", output: "386" }
          - { goos: windows, goarch: amd64, goamd64: v1, output: amd64-v1 }
          - { goos: windows, goarch: amd64, goamd64: v3, output: amd64-v3 }
          - { goos: windows, goarch: arm64, output: arm64 }

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      if: ${{ matrix.jobs.abi != '1' }}
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-download-base-url: 'https://github.com/MetaCubeX/go/releases/download/build'
        go-version: '1.26'

    - name: Set up Go1.26 loongarch abi1
      if: ${{ matrix.jobs.abi == '1' }}
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-download-base-url: 'https://github.com/MetaCubeX/loongarch64-golang/releases/download/1.26.0'
        go-version: '1.26.0'

    - name: Build
      env:
        GOOS: ${{matrix.jobs.goos}}
        GOARCH: ${{matrix.jobs.goarch}}
        GOAMD64: ${{matrix.jobs.goamd64}}
        CGO_ENABLED: 0
      run: |
        go env
        if [ "${{ matrix.jobs.goos }}" == "windows" ]; then
          go build -ldflags "-extldflags --static -w -s -buildid=" -o sparkle-service-${{matrix.jobs.goos}}-${{matrix.jobs.output}}.exe
        else
          go build -ldflags "-extldflags --static -w -s -buildid=" -o sparkle-service-${{matrix.jobs.goos}}-${{matrix.jobs.output}}
        fi

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      with:
        name: "${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}"
        path: |
          sparkle-service-${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}*

  pre-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: bin/
          merge-multiple: true

      - name: Delete current release assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: pre-release
          deleteOnlyFromDrafts: false

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Prerelease
        uses: softprops/action-gh-release@v3
        if: ${{  success() }}
        with:
          tag_name: pre-release
          files: |
            bin/*
          prerelease: true

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: bin/
          merge-multiple: true

      - name: Delete Current
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref }}
          deleteOnlyFromDrafts: false

      - name: Publish Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref }}
          files: |
            bin/*
